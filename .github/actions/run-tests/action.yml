name: run tests on Kubernetes
description: create Kubernetes job that executes pytest code

inputs:
  namespace:
    description: a name for the Kubernetes namespace that will be used
    required: true
  testbed:
    description: the testbed string that will be passed to the --testbed parameter
    required: true
  marker_expression:
    description: the marker expression that will be passed to the -m parameter
    required: true
  configuration:
    description: the configuration string that will be used to create the configuration secret, setting either this or configuration_file is required
    required: false
  configuration_file:
    description: the configuration file that will be used to create the configuration secret, setting either this or configuration is required
    required: false
  testing_docker_image:
    description: Docker image to use when executing tests
    required: true
  additional_args:
    description: additional arguments that will be passed to the pytest execution string
    required: false
  allure_results_artifact_name:
    description: name of the artifact that the allure results will be uploaded to
    required: false
    default: allure-results
  dns_records_to_resolve:
    description: list of DNS records separated by space to resolve before starting tests
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: create and select namespace
      shell: bash
      run: |
        kubectl create ns ${{ inputs.namespace }}
        kubectl config set-context --current --namespace=${{ inputs.namespace }}

    - name: set job name
      shell: bash
      id: job
      run: echo "name=testing" >> $GITHUB_OUTPUT

    - name: create configuration secret
      shell: bash
      run: |
        if [ -n "${{ inputs.configuration_file }}" ]; then
        kubectl create secret generic configuration --from-file=configuration=${{ inputs.configuration_file }}
        else
        cat << EOF > lab_info.json
        ${{ inputs.configuration || 'configuration missing' }}
        EOF

        kubectl create secret generic configuration --from-file=configuration=./lab_info.json
        fi

    - name: run tests
      shell: bash
      run: |
        cat <<EOF | kubectl apply -f -
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: "${{ steps.job.outputs.name }}"
        spec:
          template:
            metadata:
              annotations:
                cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
            spec:
              containers:
              - name: tests
                image: ${{ inputs.testing_docker_image }}
                command:
                  - /bin/bash
                  - -c
                  - |
                    HOSTS="${{ inputs.dns_records_to_resolve }}"
                    for HOST in \$HOSTS; do
                      HOST_ENTRY=""
                      until [[ ! -z "\$HOST_ENTRY" ]]; do sleep 1; HOST_ENTRY=\$(getent hosts \$HOST); done;
                      echo "\$HOST_ENTRY" >> /etc/hosts
                      echo "DNS record for \$HOST resolved successfully!"
                    done

                    cd tests
                    pytest -m "${{ inputs.marker_expression }}" -s -vvv --testbed=${{ inputs.testbed }} --alluredir=/tmp/allure-results ${{ inputs.additional_args }}
                    ret=\$?
                    # sleep some time to be able to download the Allure results
                    sleep 180
                    exit \$ret
                volumeMounts:
                - name: configuration
                  mountPath: "/wlan-testing/tests/lab_info.json"
                  subPath: configuration
                  readOnly: true
              #nodeSelector:
              #  env: tests
              tolerations:
              - key: "tests"
                operator: "Exists"
                effect: "NoSchedule"
              imagePullSecrets:
              - name: tip-docker-registry-key
              restartPolicy: Never
              volumes:
              - name: configuration
                secret:
                  secretName: configuration
          backoffLimit: 0
        EOF
        # wait for pod to spawn
        sleep 2

        JOB_NAME="${{ steps.job.outputs.name }}"
        MAX_POD_WAIT=$((1 * 60))  # wait max 1 minute for pod to exist
        MAX_EXIT_WAIT=$((5 * 60))  # wait max 5 minutes for the pod to exit
        MAX_RESULTS_WAIT=$((10 * 60 * 60))  # wait max 10 hours for results to be posted
        WAIT_TIME=5  # wait 5 seconds between attempts to get results and exit status

        # Wait for the pod to exist (it may not be scheduled yet)
        echo "waiting for pod from job '$JOB_NAME'..."
        podname=""
        for ((i = 0; i < MAX_POD_WAIT; i++)); do
          podname=$(kubectl get pods --no-headers -o custom-columns=":metadata.name" \
              -l "job-name=${JOB_NAME}" 2>/dev/null \
            | head -1 | tr -d '[:space:]'
          )
          if [[ -n "$podname" ]]; then
            break
          fi
          sleep 1
        done

        echo "waiting for pod '$podname' to be ready"
        if ! kubectl wait "pod/$podname" --for condition=ready --timeout=600s ; then
          echo "ERROR: pod '$podname' failed to start"
          exit 1
        fi

        rm -rf test_everything.xml allure-results
        echo "waiting for test results..."
        elapsed=0
        until [ -s test_everything.xml ] ; do
          if (( elapsed >= MAX_RESULTS_WAIT )); then
            echo "ERROR: test_everything.xml not produced after ${MAX_RESULTS_WAIT}s"
            exit 1
          fi
          sleep $WAIT_TIME
          elapsed=$((elapsed + WAIT_TIME))
          kubectl cp "$podname:/wlan-testing/tests/test_everything.xml" \
            test_everything.xml >/dev/null 2>&1
        done

        echo "tests completed"

        echo "list files in the pod /tmp/allure-results directory"
        kubectl exec "$podname" -- ls -la /tmp/allure-results || true

        echo "downloading allure results..."
        if ! kubectl cp --retries=3 "$podname:/tmp/allure-results" allure-results ; then
          echo "ERROR: failed to download allure results"
          exit 1
        fi

        echo "waiting for pod to exit"
        kubectl get pod "$podname" || true
        exit_code=""
        elapsed=0
        while [[ -z "$exit_code" || "$exit_code" == "null" ]]; do
          if (( elapsed >= MAX_EXIT_WAIT )); then
            echo "ERROR: pod did not terminate after ${MAX_EXIT_WAIT}s"
            exit 1
          fi
          sleep $WAIT_TIME
          elapsed=$((elapsed + $WAIT_TIME))
          exit_code=$(kubectl get pod "$podname" \
            -o jsonpath='{.status.containerStatuses[0].state.terminated.exitCode}' 2>/dev/null) || true
          echo "$podname exit code: $exit_code"
        done
        exit $exit_code

    - name: upload Allure results as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.allure_results_artifact_name }}
        path: allure-results
